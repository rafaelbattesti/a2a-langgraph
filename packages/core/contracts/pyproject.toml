[project]
name = "contracts"
version = "0.1.0"
description = "Versioned, transport-neutral payload contract primitives shared across services."
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/contracts"]
