[project]
name = "observability"
version = "0.1.0"
description = "Process-level logging configuration shared across services (telemetry later)."
requires-python = ">=3.12,<3.13"
dependencies = [
    "config",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/observability"]
