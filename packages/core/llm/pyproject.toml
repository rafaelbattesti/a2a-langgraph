[project]
name = "llm"
version = "0.1.0"
description = "Factory and helpers for the shared chat model backed by host Ollama."
requires-python = ">=3.12,<3.13"
dependencies = [
    "config",
    "pydantic>=2.7",
    "langchain-core>=0.3",
    "langchain-ollama>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/llm"]
