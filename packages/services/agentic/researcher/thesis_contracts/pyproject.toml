[project]
name = "thesis-contracts"
version = "0.1.0"
description = "Thesis-capability payload contracts (request/response models)."
requires-python = ">=3.12,<3.13"
dependencies = [
    "contracts",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thesis_contracts"]
