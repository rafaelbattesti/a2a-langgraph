[project]
name = "agent-librarian"
version = "0.1.0"
description = "Librarian agent: gathers arXiv evidence (via MCP) and synthesizes findings."
requires-python = ">=3.12,<3.13"
dependencies = [
    "a2a-core",
    "thesis-contracts",
    "thesis-config",
    "config",
    "llm",
    "langgraph>=0.2",
    "langchain-mcp-adapters>=0.1",
]

[project.scripts]
agent-librarian = "librarian.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/librarian"]
