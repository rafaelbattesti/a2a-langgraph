[project]
name = "thesis-common"
version = "0.1.0"
description = "Shared schemas, config, LLM factory and A2A helpers for the thesis MAS."
requires-python = ">=3.12,<3.13"
dependencies = [
    "a2a-sdk[http-server]>=1.0.3,<2",
    "httpx>=0.27",
    "uvicorn>=0.30",
    "pydantic>=2.7",
    "langchain-core>=0.3",
    "langchain-ollama>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thesis_common"]
