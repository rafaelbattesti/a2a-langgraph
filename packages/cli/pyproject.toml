[project]
name = "thesis-cli"
version = "0.1.0"
description = "Thin A2A client that asks the coordinator for a thesis on a topic."
requires-python = ">=3.12,<3.13"
dependencies = [
    "thesis-common",
]

[project.scripts]
thesis-cli = "thesis_cli.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thesis_cli"]
