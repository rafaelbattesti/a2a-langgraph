# Minimal dex (OIDC) config for local development — DEV ONLY, plaintext HTTP.
# Identity source behind the agentgateway extAuth seam (ARCHITECTURE.md D11).
# TLS is deliberately deferred (see deploy/certs/), so the issuer is http:// for now.
issuer: http://localhost:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true

staticClients:
  - id: a2a-langgraph
    name: a2a-langgraph
    secret: dev-client-secret
    redirectURIs:
      - http://localhost:3000/api/auth/callback/dex

enablePasswordDB: true
staticPasswords:
  # Minimal user set. bcrypt hash of "password" (dex's documented dev example).
  - email: admin@example.com
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leD81XtY5OdK"
    username: admin
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
