# Minimal agentgateway config for local development.
# Single A2A ingress listener; the backend points at the (not-yet-built)
# orchestrator, so requests will 5xx until it exists — but the gateway boots.
# Schema mirrors agentgateway's own examples/a2a/config.yaml.
config:
  logging:
    format: json

binds:
  # 15000/15020/15021 are agentgateway's own admin/stats/readiness ports — keep clear.
  - port: 8080
    listeners:
      - routes:
          - policies:
              cors:
                allowOrigins:
                  - "*"
                allowHeaders:
                  - content-type
                  - cache-control
              # mark this route as A2A traffic
              a2a: {}
            backends:
              - host: orchestrator:9999
