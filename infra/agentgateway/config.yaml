# Minimal agentgateway config for local development.
# Schema: https://raw.githubusercontent.com/agentgateway/agentgateway/main/schema/config.json
config:
  logging:
    format: json

binds:
  # 15000/15020/15021 are agentgateway's own admin/stats/readiness ports — keep clear.
  - port: 8080
    listeners:
      - routes:
          - policies:
              cors:
                allowOrigins:
                  - "*"
                allowHeaders:
                  - content-type
                  - cache-control
              a2a: {}
            backends:
              - host: orchestrator:9999
