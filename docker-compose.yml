name: thesis-mas

x-ollama: &ollama
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  LLAMA_MODEL: ${LLAMA_MODEL:-llama3.1:8b}

x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

services:
  mcp_arxiv:
    build:
      context: .
      dockerfile: packages/services/agentic/researcher/mcp_arxiv/Dockerfile
    environment:
      PORT: "8000"
    networks: [thesis]

  agent_librarian:
    build:
      context: .
      dockerfile: packages/services/agentic/researcher/librarian/Dockerfile
    environment:
      <<: *ollama
      PORT: "8080"
      PUBLIC_URL: http://agent_librarian:8080
      MCP_ARXIV_URL: http://mcp_arxiv:8000/mcp
    extra_hosts: *host-gateway
    depends_on: [mcp_arxiv]
    networks: [thesis]

  agent_critic:
    build:
      context: .
      dockerfile: packages/services/agentic/researcher/critic/Dockerfile
    environment:
      <<: *ollama
      PORT: "8080"
      PUBLIC_URL: http://agent_critic:8080
    extra_hosts: *host-gateway
    networks: [thesis]

  agent_synthesizer:
    build:
      context: .
      dockerfile: packages/services/agentic/researcher/synthesizer/Dockerfile
    environment:
      <<: *ollama
      PORT: "8080"
      PUBLIC_URL: http://agent_synthesizer:8080
    extra_hosts: *host-gateway
    networks: [thesis]

  agent_coordinator:
    build:
      context: .
      dockerfile: packages/services/agentic/researcher/coordinator/Dockerfile
    environment:
      PORT: "8080"
      PUBLIC_URL: http://localhost:9000
      LIBRARIAN_URL: http://agent_librarian:8080
      CRITIC_URL: http://agent_critic:8080
      SYNTHESIZER_URL: http://agent_synthesizer:8080
      MAX_REVISIONS: ${MAX_REVISIONS:-2}
    ports:
      - "9000:8080"
    depends_on: [agent_librarian, agent_critic, agent_synthesizer]
    networks: [thesis]

networks:
  thesis: {}
