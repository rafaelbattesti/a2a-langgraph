services:
  bastion:
    build:
      context: ./platform/agents/bastion
      dockerfile: Dockerfile
    image: oss-multi-agent-chatbot-bastion
    ports:
      - "9999:9999"

  chat-ui:
    build:
      context: ./apps/chat-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_A2A_SERVER_URL: http://localhost:9999
    image: oss-multi-agent-chatbot-chat-ui
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_A2A_SERVER_URL: http://localhost:9999
    ports:
      - "3000:3000"
